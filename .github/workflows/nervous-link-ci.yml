name: KAI Nervous Link CI

on:
  push:
    branches:
      - feat/kai-nervous-link-v0.1
  pull_request:
    paths:
      - 'nervous-link/**'
      - '.github/workflows/nervous-link-ci.yml'

jobs:
  nervous-link-tests:
    name: nervous-link / node 22
    runs-on: windows-latest
    defaults:
      run:
        working-directory: nervous-link
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nervous-link/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
